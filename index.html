<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <title>Anoma Notes • စာသားမှတ်စုများ</title>
  <!-- Tailwind + Firebase (compat) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <!-- JSZip (ဒေါင်းလုဒ်အတွက်) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --danger: #f87171;
      --radius: 18px;
    }
    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      color: var(--text);
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      transition: 0.2s;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(56,189,248,0.3);
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .input-field {
      background: #0f172a;
      border: 1px solid var(--border);
      color: white;
      border-radius: 16px;
      padding: 0.9rem 1rem;
      outline: none;
      width: 100%;
      transition: 0.2s;
    }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56,189,248,0.2); }
    .note-card {
      background: #0f172a;
      border-radius: 20px;
      padding: 1rem;
      border: 1px solid var(--border);
      transition: 0.2s;
    }
    .note-card:hover { border-color: #475569; }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1e293b;
      border-left: 4px solid #38bdf8;
      padding: 12px 20px;
      border-radius: 12px;
      color: white;
      z-index: 999;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="w-full max-w-2xl">
  <!-- AUTH SECTION -->
  <div id="authBox" class="card w-full p-8 text-center space-y-5">
    <div class="text-5xl">📝</div>
    <h1 class="text-3xl font-bold text-sky-400">Anoma Notes</h1>
    <p class="text-sm text-gray-400">စာသားမှတ်စုများ • Cloud Sync</p>

    <div class="flex justify-center gap-4 border-b border-gray-700 pb-2">
      <span id="tabLogin" class="cursor-pointer text-sky-400 border-b-2 border-sky-400 pb-1" onclick="switchTab('login')">အကောင့်ဝင်ရန်</span>
      <span id="tabRegister" class="cursor-pointer text-gray-400" onclick="switchTab('register')">အကောင့်ဖွင့်ရန်</span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-3">
      <input type="email" id="lemail" placeholder="Email" class="input-field" required>
      <input type="password" id="lpassword" placeholder="Password" class="input-field" required>
      <button type="submit" class="btn-primary w-full">ဝင်မည်</button>
    </form>

    <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-3 hidden">
      <input type="email" id="remail" placeholder="Email" class="input-field" required>
      <input type="password" id="rpassword" placeholder="Password (၆ လုံးအထက်)" class="input-field" minlength="6" required>
      <button type="submit" class="btn-primary w-full">အကောင့်ဖွင့်မည်</button>
    </form>
    <p id="authError" class="text-red-400 text-xs hidden"></p>
  </div>

  <!-- MAIN APP (hidden initially) -->
  <div id="appBox" class="card w-full p-6 hidden space-y-6">
    <!-- Header -->
    <div class="flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-sky-500/20 flex items-center justify-center text-sky-400 font-bold" id="avatarLetter">U</div>
        <div>
          <p id="userEmail" class="font-semibold text-white">user</p>
          <p class="text-xs text-emerald-400 flex items-center gap-1"><span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> အွန်လိုင်း</p>
        </div>
      </div>
      <button onclick="logout()" class="text-sm text-red-400 bg-red-400/10 px-4 py-2 rounded-full hover:bg-red-400/20">ထွက်မည်</button>
    </div>

    <!-- Add Note -->
    <div class="bg-[#0f172a] rounded-2xl p-4 border border-gray-700">
      <textarea id="noteText" rows="3" class="input-field" placeholder="မှတ်စုအသစ် ရိုက်ထည့်ပါ..."></textarea>
      <button onclick="addNote()" class="btn-primary mt-3 w-full">➕ မှတ်စုသိမ်းမည်</button>
    </div>

    <!-- Toolbar -->
    <div class="flex flex-wrap gap-2">
      <button onclick="exportJSON()" class="text-sm bg-gray-800 px-4 py-2 rounded-full border border-gray-700 hover:border-sky-400 transition">📦 Backup</button>
      <button onclick="document.getElementById('restoreFile').click()" class="text-sm bg-gray-800 px-4 py-2 rounded-full border border-gray-700 hover:border-sky-400 transition">📂 Restore</button>
      <input type="file" id="restoreFile" accept=".json" onchange="restoreNotes(event)" class="hidden">
    </div>

    <!-- Notes List -->
    <div>
      <h3 class="text-xs uppercase tracking-widest text-gray-500 mb-3">ကျွန်ုပ်၏ မှတ်စုများ</h3>
      <div id="notesContainer" class="grid gap-3">
        <p class="text-gray-500 text-center py-10 col-span-full" id="loadingHint">စောင့်ဆိုင်းနေသည်...</p>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script>
    // ---------- FIREBASE CONFIG (သင့် config ထည့်ပါ) ----------
    const firebaseConfig = {
      apiKey: "AIzaSyANqocAK2MD4L2X8PJw-WyemJE9pOBG99g",
      authDomain: "photo-netes.firebaseapp.com",
      projectId: "photo-netes",
      storageBucket: "photo-netes.firebasestorage.app",
      messagingSenderId: "779779827135",
      appId: "1:779779827135:web:038c1d22467ffd43a42d0a",
      measurementId: "G-ZNJNPZV1R6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    // Text notes collection
    const notesCol = db.collection("textNotes");

    // ---------- TOAST ----------
    function toast(msg, success = true) {
      const div = document.createElement('div');
      div.className = 'toast';
      div.style.borderLeftColor = success ? '#34d399' : '#f87171';
      div.innerText = msg;
      document.getElementById('toastContainer').appendChild(div);
      setTimeout(() => div.remove(), 2800);
    }

    // ---------- TAB SWITCH ----------
    function switchTab(tab) {
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tabLogin').classList.toggle('text-sky-400', tab === 'login');
      document.getElementById('tabLogin').classList.toggle('border-b-2', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('text-sky-400', tab === 'register');
      document.getElementById('tabRegister').classList.toggle('border-b-2', tab === 'register');
      document.getElementById('authError').classList.add('hidden');
    }

    // ---------- AUTH ----------
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('lemail').value.trim();
      const pass = document.getElementById('lpassword').value;
      auth.signInWithEmailAndPassword(email, pass)
        .then(() => toast('အကောင့်ဝင်ပြီးပါပြီ'))
        .catch(err => showAuthError(err.code));
    }

    function handleRegister(e) {
      e.preventDefault();
      const email = document.getElementById('remail').value.trim();
      const pass = document.getElementById('rpassword').value;
      auth.createUserWithEmailAndPassword(email, pass)
        .then(() => toast('အကောင့်ဖွင့်ပြီးပါပြီ'))
        .catch(err => showAuthError(err.code));
    }

    function showAuthError(code) {
      const el = document.getElementById('authError');
      el.classList.remove('hidden');
      if (code === 'auth/invalid-email') el.innerText = 'Email မှားယွင်းနေပါသည်';
      else if (code === 'auth/user-not-found') el.innerText = 'အကောင့်မရှိပါ';
      else if (code === 'auth/wrong-password') el.innerText = 'စကားဝှက်မှားနေသည်';
      else if (code === 'auth/email-already-in-use') el.innerText = 'ဤ Email ကိုသုံးထားပြီး';
      else if (code === 'auth/weak-password') el.innerText = 'စကားဝှက် အနည်းဆုံး ၆လုံး';
      else el.innerText = 'အမှားရှိနေသည် (ထပ်စမ်းပါ)';
    }

    function logout() {
      auth.signOut();
      toast('အကောင့်ထွက်ပြီးပါပြီ');
    }

    // ---------- AUTH STATE ----------
    auth.onAuthStateChanged(user => {
      document.getElementById('authBox').classList.toggle('hidden', !!user);
      document.getElementById('appBox').classList.toggle('hidden', !user);
      if (user) {
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('avatarLetter').innerText = (user.email || 'U')[0].toUpperCase();
        listenNotes(user.uid);
      }
    });

    // ---------- REAL‑TIME LISTENER ----------
    let unsub = null;
    function listenNotes(uid) {
      if (unsub) unsub();
      unsub = notesCol
        .where("uid", "==", uid)
        .orderBy("createdAt", "desc")
        .onSnapshot(snap => {
          const notes = [];
          snap.forEach(doc => notes.push({ id: doc.id, ...doc.data() }));
          renderNotes(notes);
        }, err => {
          toast('စာရင်းဖွင့်မရပါ', false);
        });
    }

    // ---------- ADD NOTE (text only) ----------
    async function addNote() {
      const text = document.getElementById('noteText').value.trim();
      if (!text) return toast('မှတ်စုရေးပါ', false);
      const user = auth.currentUser;
      if (!user) return;
      try {
        await notesCol.add({
          uid: user.uid,
          text: text,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('noteText').value = '';
        toast('သိမ်းဆည်းပြီး');
      } catch (e) {
        toast('မအောင်မြင်ပါ', false);
      }
    }

    // ---------- DELETE ----------
    async function deleteNote(id) {
      if (!confirm('ဤမှတ်စုကိုဖျက်မှာလား')) return;
      await notesCol.doc(id).delete();
      toast('ဖျက်ပြီး');
    }

    // ---------- RENDER ----------
    function renderNotes(notes) {
      const container = document.getElementById('notesContainer');
      if (!notes.length) {
        container.innerHTML = `<div class="text-center py-16 text-gray-500">
          <div class="text-5xl mb-3">📭</div><p>မှတ်စုမရှိသေးပါ</p></div>`;
        return;
      }
      container.innerHTML = notes.map((n, i) => `
        <div class="note-card flex justify-between items-start gap-2">
          <div class="flex-1">
            <p class="text-white whitespace-pre-wrap break-words">${escapeHtml(n.text)}</p>
            <span class="text-xs text-gray-500 mt-2 block">#${i+1}</span>
          </div>
          <button onclick="deleteNote('${n.id}')" class="text-red-400 hover:text-red-300 text-xl" title="ဖျက်မည်">🗑️</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.innerText = str;
      return div.innerHTML;
    }

    // ---------- BACKUP / RESTORE (JSON) ----------
    async function exportJSON() {
      const user = auth.currentUser;
      if (!user) return;
      const snap = await notesCol.where("uid", "==", user.uid).orderBy("createdAt","desc").get();
      const data = [];
      snap.forEach(doc => data.push({ text: doc.data().text, createdAt: doc.data().createdAt?.toDate?.() || null }));
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `anoma_notes_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      toast('Backup ဒေါင်းလုဒ်ပြီး');
    }

    async function restoreNotes(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (!confirm('လက်ရှိမှတ်စုများထဲသို့ ထည့်သွင်းမည်။ ဆက်လုပ်မလား')) { event.target.value=''; return; }
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const arr = JSON.parse(e.target.result);
          if (!Array.isArray(arr)) throw new Error('ဖိုင်ပုံစံမမှန်');
          const batch = db.batch();
          const user = auth.currentUser;
          arr.forEach(item => {
            const ref = notesCol.doc();
            batch.set(ref, {
              uid: user.uid,
              text: item.text || '',
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          });
          await batch.commit();
          toast(`${arr.length} ခု restore လုပ်ပြီး`);
        } catch (err) {
          toast('Restore မအောင်မြင်ပါ', false);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
  </script>
</body>
</html>
